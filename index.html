<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Smart Mirror</title>
    <style>
        body { 
            background: black; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            padding: 30px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Container Utama yang Membagi Kiri dan Kanan */
        #main-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        /* Kolom Kiri (Jadwal Sholat, Kalender & Financial Ticker) */
        #left-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
            z-index: 5;
        }

        /* Bagian Kiri Atas (Jadwal Sholat) */
        #prayer-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border-left: 3px solid #00E676;
            box-sizing: border-box;
        }
        #prayer-countdown {
            font-size: 16px;
            font-weight: bold;
            color: #00E676;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        .prayer-row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            margin: 4px 0;
            color: #aaa;
        }
        .prayer-row.next-prayer {
            color: #fff;
            font-weight: bold;
            font-size: 18px;
        }

        /* Kalender Transparan (Kiri Tengah) */
        #calendar-container {
            width: 100%;
            background: transparent; 
            padding: 10px 15px;
            border-radius: 12px;
            border-left: 3px solid rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
        }
        #calendar-header {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 12px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 6px;
        }
        #calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 4px;
            font-size: 14px;
        }
        .cal-day-name {
            font-weight: bold;
            color: #aaa;
            font-size: 12px;
            padding-bottom: 6px;
        }
        .cal-date {
            padding: 5px 0;
            color: #fff; 
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .cal-date.today {
            background: #fff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        .cal-date.empty {
            visibility: hidden;
        }

        /* ---------------------------------------------------- */
        /* Fitur Baru: Financial Ticker (Kiri Bawah)           */
        /* ---------------------------------------------------- */
        #fin-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 12px;
            border-left: 3px solid #FFD700; /* Warna Emas / Bitcoin */
            box-sizing: border-box;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .fin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .fin-label {
            font-weight: bold;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fin-value {
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }
        .fin-change {
            font-size: 11px;
            padding: 2px 5px;
            border-radius: 4px;
            margin-left: 4px;
        }
        .up { background: rgba(76, 175, 80, 0.2); color: #4CAF50; border: 1px solid #4CAF50; }
        .down { background: rgba(244, 67, 54, 0.2); color: #F44336; border: 1px solid #F44336; }

        /* Bagian Atas Tengah (Waktu & Salam) */
        #top-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        #greeting { font-size: 24px; color: #fff; }
        #jam { font-size: 110px; font-weight: bold; line-height: 1; }

        /* Bagian Tengah (Kutipan) */
        #quote { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 18px; 
            font-style: italic; 
            color: #666; 
            text-align: center;
            padding: 0 15%;
        }

        /* Bagian Bawah Kanan (Musik, Cuaca, AQI, Tanggal & Bulan) */
        #bottom-right-container { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            text-align: right; 
            margin-bottom: 15px;
            position: absolute;
            right: 30px;
            bottom: 50px;
        }
        
        /* Cyber Audio Visualizer */
        #visualizer {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 20px;
            margin-bottom: 6px;
            margin-right: 10px;
        }
        .bar {
            width: 4px;
            background: #1db954; 
            border-radius: 2px;
            animation: bounce 0.8s infinite ease-in-out alternate;
        }
        .bar:nth-child(1) { height: 8px; animation-delay: 0.1s; }
        .bar:nth-child(2) { height: 16px; animation-delay: 0.4s; }
        .bar:nth-child(3) { height: 12px; animation-delay: 0.2s; }
        .bar:nth-child(4) { height: 18px; animation-delay: 0.6s; }
        .bar:nth-child(5) { height: 10px; animation-delay: 0.3s; }
        
        @keyframes bounce {
            0% { transform: scaleY(0.3); opacity: 0.5; }
            100% { transform: scaleY(1.2); opacity: 1; }
        }

        /* Container Musik */
        #music-container iframe {
            filter: grayscale(100%) brightness(1.2) opacity(0.6);
            mix-blend-mode: screen; 
        }
        #music-container { 
            margin-bottom: 15px; 
            width: 300px; 
        }

        /* Container Cuaca */
        #weather { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 24px; }
        #weather-icon { width: 50px; height: 50px; }
        #weather-info { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.2; }
        #temp { font-weight: bold; }
        #desc { font-size: 14px; color: #aaa; text-transform: capitalize; }
        
        /* AQI Badge (Kualitas Udara) */
        #aqi-badge {
            font-size: 12px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 12px;
            margin-top: 6px;
            margin-bottom: 8px;
            background: #4CAF50;
            color: black;
            display: inline-block;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
        }

        /* Tanggal & Fase Bulan */
        #date-moon-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            color: #ccc;
            margin-top: 2px;
        }
        #moon-phase { font-size: 22px; }

        /* Bagian Paling Bawah (News Ticker / Berita) */
        #news-ticker {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
            color: #ddd;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            border-left: 3px solid #2196F3;
        }
        #news-label {
            font-weight: bold;
            color: #2196F3;
            margin-right: 15px;
            white-space: nowrap;
        }
        #news-content {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="main-grid">
        <!-- Kolom Kiri: Sholat, Kalender & Finansial -->
        <div id="left-column">
            <div id="prayer-container">
                <div id="prayer-countdown">Loading jadwal sholat...</div>
                <div id="prayer-list"></div>
            </div>
            
            <div id="calendar-container">
                <div id="calendar-header">MEMUAT KALENDER...</div>
                <div id="calendar-grid"></div>
            </div>

            <!-- Fitur Baru: Financial Ticker (BTC/USD, USD/IDR, & Emas per Gram/IDR) -->
            <div id="fin-container">
                <div class="fin-row">
                    <span class="fin-label">₿ BTC/USD</span>
                    <div>
                        <span class="fin-value" id="btc-rate">Loading...</span>
                        <span class="fin-change" id="btc-change">0.0%</span>
                    </div>
                </div>
                <div class="fin-row">
                    <span class="fin-label">💵 USD/IDR</span>
                    <span class="fin-value" id="usd-rate">Loading...</span>
                </div>
                <div class="fin-row">
                    <span class="fin-label">🪙 EMAS/GRAM</span>
                    <div>
                        <span class="fin-value" id="gold-rate">Loading...</span>
                        <span class="fin-change" id="gold-change">0.0%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Waktu & Salam (Tengah Atas) -->
        <div id="top-container">
            <div id="greeting">Halo!</div>
            <div id="jam">00:00</div>
        </div>
    </div>

    <div id="quote">"Loading motivasi..."</div>

    <!-- Area Kanan Bawah -->
    <div id="bottom-right-container">
        <div id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div id="music-container">
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/0GXqOyHOle8IxKvZvjIfi2?utm_source=generator&si=3c63d89eee17480f" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <div id="weather">
            <div id="weather-info">
                <span id="temp">--°C</span>
                <span id="desc">Loading...</span>
            </div>
            <img id="weather-icon" src="" alt="">
        </div>

        <div id="aqi-badge">AQI: Loading...</div>
        
        <div id="date-moon-container">
            <span id="tanggal">Loading...</span>
            <span id="moon-phase" title="Fase Bulan">🌓</span>
        </div>
    </div>

    <!-- Running News Ticker -->
    <div id="news-ticker">
        <span id="news-label">NYT TOP STORIES</span>
        <span id="news-content">Loading berita terbaru...</span>
    </div>

    <script>
        // 1. Fungsi Waktu & Fase Bulan
        function updateJam() {
            const sekarang = new Date();
            const jam = sekarang.getHours();
            let salam = (jam >= 5 && jam < 11) ? "Selamat Pagi!" : 
                        (jam >= 11 && jam < 15) ? "Selamat Siang!" : 
                        (jam >= 15 && jam < 18) ? "Selamat Sore!" : "Selamat Malam!";
            
            document.getElementById('greeting').innerText = salam;
            document.getElementById('jam').innerText = sekarang.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('tanggal').innerText = sekarang.toLocaleDateString('id-ID', {weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'});
            
            updateMoonPhase(sekarang);
        }

        function updateMoonPhase(date) {
            let year = date.getFullYear();
            let month = date.getMonth() + 1;
            let day = date.getDate();
            if (month < 3) { year--; month += 12; }
            let c = 365.25 * year;
            let e = 30.6 * month;
            let jd = c + e + day - 694039.09; 
            let phase = jd / 29.5305882;
            phase -= Math.floor(phase);
            phase = Math.round(phase * 8);
            if (phase >= 8) phase = 0;
            
            const moonIcons = ["🌑", "🌒", "🌓", "🌔", "🌕", "🌖", "🌗", "🌘"];
            document.getElementById('moon-phase').innerText = moonIcons[phase];
        }

        setInterval(updateJam, 1000);
        updateJam();

        // 2. Fitur Kalender Bulanan Minimalis
        function renderCalendar() {
            const sekarang = new Date();
            const tahun = sekarang.getFullYear();
            const bulan = sekarang.getMonth();
            const tanggalHariIni = sekarang.getDate();

            const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const namaHari = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

            document.getElementById('calendar-header').innerText = `${namaBulan[bulan]} ${tahun}`;

            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            namaHari.forEach(hari => {
                const el = document.createElement('div');
                el.className = 'cal-day-name';
                el.innerText = hari;
                grid.appendChild(el);
            });

            const hariPertama = new Date(tahun, bulan, 1).getDay();
            const jumlahHari = new Date(tahun, bulan + 1, 0).getDate();

            for (let i = 0; i < hariPertama; i++) {
                const el = document.createElement('div');
                el.className = 'cal-date empty';
                grid.appendChild(el);
            }

            for (let i = 1; i <= jumlahHari; i++) {
                const el = document.createElement('div');
                el.className = 'cal-date';
                if (i === tanggalHariIni) {
                    el.classList.add('today'); 
                }
                el.innerText = i;
                grid.appendChild(el);
            }
        }
        renderCalendar();
        setInterval(renderCalendar, 3600000); 

        // ----------------------------------------------------
        // 3. Financial Ticker (BTC/USD, USD/IDR, & Emas per Gram/IDR)
        // ----------------------------------------------------
        function updateFinancials() {
            // A. Mengambil Harga Bitcoin (dalam USD) & Harga Emas (dalam IDR) sekaligus
            fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pax-gold&vs_currencies=usd,idr&include_24hr_change=true')
                .then(res => res.json())
                .then(data => {
                    // Update Bitcoin ke USD
                    if(data && data['bitcoin']) {
                        const btcUsd = data['bitcoin'].usd;
                        const btcChange = data['bitcoin'].usd_24h_change;

                        document.getElementById('btc-rate').innerText = '$' + btcUsd.toLocaleString('en-US');
                        
                        const changeEl = document.getElementById('btc-change');
                        const isPositive = btcChange >= 0;
                        changeEl.innerText = (isPositive ? '+' : '') + btcChange.toFixed(2) + '%';
                        changeEl.className = 'fin-change ' + (isPositive ? 'up' : 'down');
                    }

                    // Update Emas ke IDR (Dikonversi ke 1 Gram)
                    if(data && data['pax-gold']) {
                        const emasPerTroyOunce = data['pax-gold'].idr;
                        const goldChange = data['pax-gold'].idr_24h_change;

                        // Trik Konversi: 1 Troy Ounce = 31.1035 Gram
                        const emasPerGram = emasPerTroyOunce / 31.1035;

                        document.getElementById('gold-rate').innerText = 'Rp ' + Math.round(emasPerGram).toLocaleString('id-ID');

                        const changeEl = document.getElementById('gold-change');
                        const isPositive = goldChange >= 0;
                        changeEl.innerText = (isPositive ? '+' : '') + goldChange.toFixed(2) + '%';
                        changeEl.className = 'fin-change ' + (isPositive ? 'up' : 'down');
                    }
                })
                .catch(err => console.error("Gagal memuat Kripto & Emas:", err));

            // B. Mengambil Kurs USD ke IDR (Frankfurter API)
            fetch('https://api.frankfurter.app/latest?from=USD&to=IDR')
                .then(res => res.json())
                .then(data => {
                    if(data && data.rates && data.rates.IDR) {
                        const idr = data.rates.IDR;
                        document.getElementById('usd-rate').innerText = 'Rp ' + idr.toLocaleString('id-ID');
                    }
                })
                .catch(err => console.error("Gagal memuat USD/IDR:", err));
        }
        
        updateFinancials(); 
        setInterval(updateFinancials, 300000); 

        // 4. Fungsi Cuaca & AQI
        const apiKey = '41841c0f862f7d88fbc87719b4c4db02';
        const city = 'Jakarta'; 
        function updateCuaca() {
            fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`)
                .then(response => response.json())
                .then(data => {
                    if(data.main && data.weather) {
                        document.getElementById('temp').innerText = Math.round(data.main.temp) + '°C';
                        document.getElementById('desc').innerText = data.weather[0].description;
                        document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
                        
                        updateAQI(data.coord.lat, data.coord.lon);
                    }
                })
                .catch(err => console.error("Gagal mengambil data cuaca:", err));
        }

        function updateAQI(lat, lon) {
            fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`)
                .then(res => res.json())
                .then(data => {
                    if(data.current && data.current.us_aqi !== undefined) {
                        const aqi = data.current.us_aqi;
                        const badge = document.getElementById('aqi-badge');
                        
                        if(aqi <= 50) {
                            badge.innerText = `AQI: ${aqi} (Baik)`;
                            badge.style.background = '#4CAF50'; 
                            badge.style.color = 'black';
                        } else if(aqi <= 100) {
                            badge.innerText = `AQI: ${aqi} (Sedang)`;
                            badge.style.background = '#FFEB3B'; 
                            badge.style.color = 'black';
                        } else if(aqi <= 150) {
                            badge.innerText = `AQI: ${aqi} (Sensitif)`;
                            badge.style.background = '#FF9800'; 
                            badge.style.color = 'black';
                        } else {
                            badge.innerText = `AQI: ${aqi} (Buruk)`;
                            badge.style.background = '#F44336'; 
                            badge.style.color = 'white';
                        }
                    }
                })
                .catch(err => console.error("Gagal memuat AQI:", err));
        }

        updateCuaca();
        setInterval(updateCuaca, 1800000);

        // 5. Fungsi Kutipan
        const quotes = [
            "Jadilah versi terbaik dari dirimu sendiri.", 
            "Hari ini adalah kesempatan baru.", 
            "Mimpi besar dimulai dari langkah kecil."
        ];
        document.getElementById('quote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;

        // 6. Fitur Jadwal Sholat & Hitung Mundur (Aladhan API)
        let jadwalSholatHariIni = {};
        function updateJadwalSholat() {
            fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=Indonesia&method=11`)
                .then(response => response.json())
                .then(data => {
                    if(data.data && data.data.timings) {
                        const t = data.data.timings;
                        jadwalSholatHariIni = {
                            "Subuh": t.Fajr,
                            "Dhuha": t.Sunrise,
                            "Dzuhur": t.Dhuhr,
                            "Ashar": t.Asr,
                            "Maghrib": t.Maghrib,
                            "Isya": t.Isha
                        };
                        renderJadwalSholat();
                    }
                })
                .catch(err => console.error("Gagal memuat jadwal sholat:", err));
        }

        function renderJadwalSholat() {
            const listEl = document.getElementById('prayer-list');
            listEl.innerHTML = '';
            
            const sekarang = new Date();
            const waktuSekarangMenit = sekarang.getHours() * 60 + sekarang.getMinutes();
            let nextPrayerName = "-";
            let selisihMenitTerkecil = Infinity;

            for (let [nama, waktu] of Object.entries(jadwalSholatHariIni)) {
                const [jam, menit] = waktu.split(':').map(Number);
                const waktuSholatMenit = jam * 60 + menit;
                
                if (waktuSholatMenit > waktuSekarangMenit && (waktuSholatMenit - waktuSekarangMenit) < selisihMenitTerkecil) {
                    selisihMenitTerkecil = waktuSholatMenit - waktuSekarangMenit;
                    nextPrayerName = nama;
                }

                const row = document.createElement('div');
                row.className = 'prayer-row';
                row.innerHTML = `<span>${nama}</span><span>${waktu}</span>`;
                listEl.appendChild(row);
            }

            const rows = listEl.getElementsByClassName('prayer-row');
            for(let row of rows) {
                if(row.innerText.includes(nextPrayerName)) {
                    row.classList.add('next-prayer');
                }
            }

            if (nextPrayerName !== "-") {
                const jamSisa = Math.floor(selisihMenitTerkecil / 60);
                const menitSisa = selisihMenitTerkecil % 60;
                let teksCountdown = `Menuju ${nextPrayerName}: `;
                if(jamSisa > 0) teksCountdown += `${jamSisa} jam `;
                teksCountdown += `${menitSisa} menit lagi`;
                document.getElementById('prayer-countdown').innerText = teksCountdown;
            } else {
                document.getElementById('prayer-countdown').innerText = "Waktu Isya telah lewat";
            }
        }

        updateJadwalSholat();
        setInterval(updateJadwalSholat, 3600000); 
        setInterval(renderJadwalSholat, 60000); 

        // 7. Fitur Berita Terkini (NYT Top Stories)
        let daftarBerita = [
            "Selamat datang di Smart Mirror. Harap tunggu, sedang memuat berita terbaru hari ini...",
            "Tips: Tetap semangat dan jaga kesehatan setiap hari!"
        ];
        let indeksBerita = 0;

        function updateBeritaAPI() {
            const rssUrl = encodeURIComponent('https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml');
            fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`)
                .then(response => response.json())
                .then(data => {
                    if(data.items && data.items.length > 0) {
                        daftarBerita = data.items.map(item => item.title);
                    }
                })
                .catch(err => console.error("Gagal memuat berita:", err));
        }

        function rotasiBerita() {
            const el = document.getElementById('news-content');
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerText = daftarBerita[indeksBerita];
                el.style.opacity = 1;
                el.style.transition = "opacity 0.5s ease-in-out";
                indeksBerita = (indeksBerita + 1) % daftarBerita.length;
            }, 500);
        }

        updateBeritaAPI();
        rotasiBerita();
        setInterval(updateBeritaAPI, 1800000); 
        setInterval(rotasiBerita, 80000); 
    </script>
</body>
</html>
