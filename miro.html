<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: black; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #jam { font-size: 80px; font-weight: bold; }
        #tanggal { font-size: 24px; color: #ccc; }
        #cuaca { font-size: 30px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="jam">00:00</div>
    <div id="tanggal">Loading...</div>
    <div id="cuaca">Cuaca: --°C</div>

    <script>
        function updateJam() {
            const sekarang = new Date();
            document.getElementById('jam').innerText = sekarang.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('tanggal').innerText = sekarang.toDateString();
        }
        setInterval(updateJam, 1000);
        updateJam();
    </script>
</body>
</html>
